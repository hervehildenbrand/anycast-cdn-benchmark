! FRR Baseline for rr1 (Route Reflector)
! Loopback: 10.255.0.1, fd00::1
! No routing protocols configured. Agent must design and apply.

frr version 10.5.1
frr defaults traditional
hostname rr1
log syslog informational
service integrated-vtysh-config
!
interface lo
 ip address 10.255.0.1/32
 ipv6 address fd00::1/128
exit
!
interface eth1
 description to-rr2
 ip address 10.0.0.0/31
 ipv6 address fd00:0:0::0/127
exit
!
interface eth2
 description to-pe-w
 ip address 10.0.0.2/31
 ipv6 address fd00:0:1::0/127
exit
!
interface eth3
 description to-pe-e
 ip address 10.0.0.4/31
 ipv6 address fd00:0:2::0/127
exit
!
end