! FRR Baseline for rr2 (Route Reflector)
! Loopback: 10.255.0.2, fd00::2
! No routing protocols configured. Agent must design and apply.

frr version 10.5.1
frr defaults traditional
hostname rr2
log syslog informational
service integrated-vtysh-config
!
interface lo
 ip address 10.255.0.2/32
 ipv6 address fd00::2/128
exit
!
interface eth1
 description to-rr1
 ip address 10.0.0.1/31
 ipv6 address fd00:0:0::1/127
exit
!
interface eth2
 description to-pe-w
 ip address 10.0.0.6/31
 ipv6 address fd00:0:3::0/127
exit
!
interface eth3
 description to-pe-e
 ip address 10.0.0.8/31
 ipv6 address fd00:0:4::0/127
exit
!
end