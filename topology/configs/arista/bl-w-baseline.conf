! bl-w - Baseline Configuration
! Role: border-leaf, DC: west

hostname bl-w

! Management
service routing protocols model multi-agent
management api http-commands
   no shutdown

! Local user for eAPI access
username admin privilege 15 role network-admin secret admin123

! Global routing
ip routing
ipv6 unicast-routing

! Loopback
interface Loopback0
   ip address 10.255.10.21/32
   ipv6 address fd00:10::21/128

interface Loopback1
   description VTEP
   ip address 10.255.11.21/32

! P2P to spine-w
interface Ethernet1
   description to-spine-w
   no switchport
   mtu 9214
   ip address 10.1.0.5/31
   ipv6 address fd00:1:2::1/127

! P2P to spine-w
interface Ethernet2
   description to-spine-w
   no switchport
   mtu 9214
   ip address 10.1.0.7/31
   ipv6 address fd00:1:3::1/127

! P2P to pe-w
interface Ethernet3
   description to-pe-w
   no switchport
   mtu 9214
   ip address 10.2.0.1/31
   ipv6 address fd00:2::1/127

! P2P to pe-w
interface Ethernet4
   description to-pe-w
   no switchport
   mtu 9214
   ip address 10.2.0.3/31
   ipv6 address fd00:2:1::1/127
