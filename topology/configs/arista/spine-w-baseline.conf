! spine-w - Baseline Configuration
! Role: spine, DC: west

hostname spine-w

! Management
service routing protocols model multi-agent
management api http-commands
   no shutdown

! Local user for eAPI access
username admin privilege 15 role network-admin secret admin123

! Global routing
ip routing
ipv6 unicast-routing

! Loopback
interface Loopback0
   ip address 10.255.10.1/32
   ipv6 address fd00:10::1/128

! P2P to l1-w
interface Ethernet1
   description to-l1-w
   no switchport
   mtu 9214
   ip address 10.1.0.0/31
   ipv6 address fd00:1:0::0/127

! P2P to l2-w
interface Ethernet2
   description to-l2-w
   no switchport
   mtu 9214
   ip address 10.1.0.2/31
   ipv6 address fd00:1:1::0/127

! P2P to bl-w
interface Ethernet3
   description to-bl-w
   no switchport
   mtu 9214
   ip address 10.1.0.4/31
   ipv6 address fd00:1:2::0/127

! P2P to bl-w
interface Ethernet4
   description to-bl-w
   no switchport
   mtu 9214
   ip address 10.1.0.6/31
   ipv6 address fd00:1:3::0/127
