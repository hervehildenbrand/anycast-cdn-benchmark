/* pe-w - Baseline Configuration */
/* Role: PE Router, DC: west */

system {
    host-name pe-w;
    services {
        ssh;
        netconf {
            ssh;
        }
    }
}

interfaces {
    et-0/0/0 {
        description "to rr1";
        mtu 9200;
        unit 0 {
            family inet {
                address 10.0.0.3/31;
            }
            family inet6 {
                address fd00:0:1::1/127;
            }
            family iso;
            family mpls;
        }
    }
    et-0/0/1 {
        description "to rr2";
        mtu 9200;
        unit 0 {
            family inet {
                address 10.0.0.7/31;
            }
